<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <script src="main.js"></script>
    <title>AtCoder Categories</title>
</head>
<body>
    <div class="header">
        <h1>AtCoder Categories</h1>
    </div>
    <div class="root-container">
        <div class="category-container">
            <div class="category-search">
                <input type="text" id="category-filter-search-input" autocomplete="off" placeholder="Search category..." oninput="SearchFilter(this.value)"/>
            </div>
            <div id="category-list">

            </div>
        </div>
        <div class="category-filters">
            <div id="category-filters">
                <button onclick="ClearFilter()">Clear Filters</button>
                <div id="category-filters-list">
                </div>
            </div>
        </div>
        <div class="main-content">
            <button onclick="Load()">Refresh</button>
            <div id="content"> 
                <div class="problem-container">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
